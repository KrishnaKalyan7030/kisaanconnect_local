<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Buyer Dashboard - KisaanConnect</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="../../js/api.js"></script>
  <script src="../../js/main.js"></script>

  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body class="bg-[#f8f9f5] min-h-screen">

<nav class="bg-white shadow-sm border-b sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <i class="fas fa-seedling text-3xl text-emerald-600"></i>
      <div>
        <span class="text-2xl font-bold text-emerald-700">Kisaan</span>
        <span class="text-2xl font-bold text-emerald-600">Connect</span>
      </div>
    </div>
    <div class="flex items-center gap-6 text-sm">
      <a href="../../marketplace.html" class="hover:text-emerald-600">Marketplace</a>
      <button onclick="window.Main.logout()" class="px-5 py-2.5 border border-emerald-600 text-emerald-700 rounded-3xl hover:bg-emerald-50">Logout</button>
    </div>
  </div>
</nav>

<div class="max-w-7xl mx-auto px-4 py-10">

  <h1 id="welcome-text" class="text-3xl sm:text-4xl font-bold text-emerald-800">Welcome back, Buyer! 🛒</h1>
  <p class="text-gray-600 mt-2">Discover fresh produce from local farmers</p>

  <!-- Stats -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mt-10">
    <div class="bg-white rounded-3xl p-6 shadow">
      <p class="text-gray-500">Available Products</p>
      <p id="available-count" class="text-5xl font-bold text-emerald-700 mt-3">0</p>
    </div>
    <div class="bg-white rounded-3xl p-6 shadow">
      <p class="text-gray-500">Farmers Connected</p>
      <p id="farmers-count" class="text-5xl font-bold text-emerald-700 mt-3">0</p>
    </div>
    <div class="bg-white rounded-3xl p-6 shadow">
      <p class="text-gray-500">This Week</p>
      <p id="this-week" class="text-5xl font-bold text-emerald-700 mt-3">12</p>
    </div>
  </div>

  <!-- Search -->
  <div class="mt-10">
    <input type="text" id="search-input" placeholder="Search products..." 
      class="w-full px-6 py-5 rounded-3xl border border-gray-300 focus:border-emerald-600 text-base"
      onkeyup="if(event.key === 'Enter') goToMarketplace()"/>
  </div>

  <!-- Fresh Picks -->
  <div class="mt-12">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-semibold">Fresh Picks for You</h2>
      <a href="../../marketplace.html" class="text-emerald-600 font-medium">Browse All →</a>
    </div>
    <div id="featured-products" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4"></div>
  </div>
</div>

<script>
async function loadBuyerDashboard() {
  const result = await window.API.getAllProducts();
  if (!result.success) return;

  const products = result.data || [];
  document.getElementById('available-count').textContent = products.length;

  const container = document.getElementById('featured-products');
  container.innerHTML = products.slice(0, 8).map(p => `
    <div onclick="window.location.href='../../marketplace.html?product=${p.id}'" 
      class="bg-white rounded-3xl overflow-hidden shadow cursor-pointer active:scale-95">
      <img src="${p.image_url || 'https://picsum.photos/id/201/400/300'}" class="w-full h-40 object-cover"/>
      <div class="p-4">
        <h3 class="font-semibold">${p.name}</h3>
        <p class="text-emerald-600 font-bold text-xl">₹${p.price}/kg</p>
      </div>
    </div>
  `).join('');
}

function goToMarketplace() {
  const query = document.getElementById('search-input').value.trim();
  window.location.href = query 
    ? `../../marketplace.html?search=${encodeURIComponent(query)}` 
    : "../../marketplace.html";
}

document.addEventListener('DOMContentLoaded', () => {
  if (!window.API.isLoggedIn()) {
    window.location.href = "../../login.html";
    return;
  }
  const role = localStorage.getItem("user_type");
  if (role !== "buyer") {
    window.location.href = "../../marketplace.html";
    return;
  }
  loadBuyerDashboard();
});
</script>
</body>
</html>
