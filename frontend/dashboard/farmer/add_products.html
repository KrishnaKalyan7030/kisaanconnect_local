<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Product - KisaanConnect</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="../../js/api.js"></script>
  <script src="../../js/main.js"></script>

  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body class="bg-[#f8f9f5] min-h-screen">

<!-- Navbar -->
<nav class="bg-white shadow-sm border-b sticky top-0 z-50">
  <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <i class="fas fa-seedling text-3xl text-emerald-600"></i>
      <h1 class="text-2xl font-bold text-emerald-700">KisaanConnect</h1>
    </div>
    <div class="flex gap-4 text-sm">
      <a href="index.html" class="text-emerald-600 font-medium">Dashboard</a>
      <a href="my_products.html" class="text-emerald-600 font-medium">My Products</a>
    </div>
  </div>
</nav>

<div class="max-w-3xl mx-auto px-4 py-8">
  <div class="bg-white rounded-3xl shadow-xl p-6 sm:p-8">

    <h2 class="text-3xl font-bold text-emerald-700 mb-8 flex items-center gap-3">
      <i class="fas fa-plus"></i> Add New Product
    </h2>

    <form id="product-form">

      <!-- Image -->
      <div class="mb-8">
        <label class="block mb-3 font-medium text-gray-700">Product Image <span class="text-red-500">*</span></label>
        <input type="file" id="image" accept="image/*" onchange="previewImage(event)" required
          class="w-full p-4 border-2 border-dashed border-gray-300 rounded-2xl file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-sm file:bg-emerald-50 file:text-emerald-700"/>
        <img id="preview" class="mt-6 rounded-2xl hidden w-full h-56 object-cover border"/>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div>
          <label class="block mb-2 font-medium text-gray-700">Product Name <span class="text-red-500">*</span></label>
          <input type="text" id="name" required class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-emerald-600"/>
        </div>
        <div>
          <label class="block mb-2 font-medium text-gray-700">Price (₹/kg) <span class="text-red-500">*</span></label>
          <input type="number" id="price" step="0.01" min="0" required class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-emerald-600"/>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mt-6">
        <div>
          <label class="block mb-2 font-medium text-gray-700">Quantity (kg) <span class="text-red-500">*</span></label>
          <input type="number" id="quantity" min="0" required class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-emerald-600"/>
        </div>
        <div>
          <label class="block mb-2 font-medium text-gray-700">Village <span class="text-red-500">*</span></label>
          <input type="text" id="village" required class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-emerald-600"/>
        </div>
      </div>

      <div class="mt-6">
        <label class="block mb-2 font-medium text-gray-700">Phone Number <span class="text-red-500">*</span></label>
        <input type="tel" id="phone" required class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-emerald-600"/>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mt-6">
        <div>
          <label class="block mb-2 font-medium text-gray-700">Available Date <span class="text-red-500">*</span></label>
          <input type="date" id="available_date" required class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-emerald-600"/>
        </div>
        <div>
          <label class="block mb-2 font-medium text-gray-700">Available Time <span class="text-red-500">*</span></label>
          <input type="time" id="available_time" required class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-emerald-600"/>
        </div>
      </div>

      <div class="mt-6">
        <label class="block mb-2 font-medium text-gray-700">Description (Optional)</label>
        <textarea id="description" rows="4" class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:border-emerald-600"></textarea>
      </div>

      <button type="submit" id="submit-btn"
        class="mt-10 w-full bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white py-4 rounded-3xl font-semibold text-lg">
        Add Product to Marketplace
      </button>
    </form>
  </div>
</div>

<script>
// Preview Image
function previewImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById("preview").src = e.target.result;
    document.getElementById("preview").classList.remove("hidden");
  };
  reader.readAsDataURL(file);
}

// Submit Handler
document.getElementById("product-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const btn = document.getElementById("submit-btn");
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Adding...`;

  if (!window.API.isLoggedIn()) {
    window.Main.showToast("Please login first", "error");
    btn.disabled = false;
    btn.innerHTML = originalText;
    return;
  }

  const formData = new FormData();
  formData.append("name", document.getElementById("name").value.trim());
  formData.append("village", document.getElementById("village").value.trim());
  formData.append("phone", document.getElementById("phone").value.trim());
  formData.append("price", document.getElementById("price").value);
  formData.append("quantity", document.getElementById("quantity").value);
  formData.append("available_date", document.getElementById("available_date").value);
  formData.append("available_time", document.getElementById("available_time").value);
  formData.append("description", document.getElementById("description").value.trim() || "");

  const imageFile = document.getElementById("image").files[0];
  if (!imageFile) {
    window.Main.showToast("Please select an image", "error");
    btn.disabled = false;
    btn.innerHTML = originalText;
    return;
  }
  formData.append("image", imageFile);

  const result = await window.API.createProduct(formData);

  if (result.success) {
    window.Main.showToast("Product added successfully!", "success");
    setTimeout(() => window.location.href = "my_products.html", 1500);
  } else {
    window.Main.showToast(result.message || "Failed to add product", "error");
  }

  btn.disabled = false;
  btn.innerHTML = originalText;
});
</script>

</body>
</html>
