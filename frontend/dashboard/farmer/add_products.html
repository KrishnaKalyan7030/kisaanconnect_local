<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Product - KisaanConnect</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="../../js/api.js"></script>

  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>

<body class="bg-[#f8f9f5] min-h-screen">

<!-- Navbar -->
<nav class="bg-white shadow-sm border-b">
  <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between">
    <h1 class="text-xl font-bold text-emerald-700">KisaanConnect</h1>

    <div class="flex gap-4">
      <a href="index.html" class="text-emerald-600">Dashboard</a>
      <a href="my_products.html" class="text-emerald-600">My Products</a>
    </div>
  </div>
</nav>

<div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-3xl shadow">

  <h2 class="text-2xl font-bold text-emerald-700 mb-6">
    Add New Product
  </h2>

  <form id="product-form">

    <!-- Image -->
    <div class="mb-6">
      <label class="block mb-2">Product Image</label>
      <input type="file" id="image" accept="image/*" onchange="previewImage(event)">
      <img id="preview" class="mt-4 rounded-xl hidden w-full h-60 object-cover"/>
    </div>

    <!-- Name -->
    <div class="mb-4">
      <label>Name</label>
      <input type="text" id="name" required
        class="w-full p-3 border rounded-xl"/>
    </div>

    <!-- Price -->
    <div class="mb-4">
      <label>Price (₹/kg)</label>
      <input type="number" id="price" required
        class="w-full p-3 border rounded-xl"/>
    </div>

    <!-- Quantity -->
    <div class="mb-4">
      <label>Quantity (kg)</label>
      <input type="number" id="quantity" required
        class="w-full p-3 border rounded-xl"/>
    </div>

    <!-- Village -->
    <div class="mb-4">
      <label>Village</label>
      <input type="text" id="village" required
        class="w-full p-3 border rounded-xl"/>
    </div>

    <!-- Phone -->
    <div class="mb-4">
      <label>Phone</label>
      <input type="text" id="phone" required
        class="w-full p-3 border rounded-xl"/>
    </div>

    <!-- Description -->
    <div class="mb-6">
      <label>Description</label>
      <textarea id="description"
        class="w-full p-3 border rounded-xl"></textarea>
    </div>

    <!-- Submit -->
    <button type="submit"
      class="w-full bg-emerald-600 text-white py-3 rounded-xl hover:bg-emerald-700">
      Add Product
    </button>

  </form>

</div>

<script>
let imageData = "";

// Preview Image
function previewImage(event) {
  const file = event.target.files[0];

  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    imageData = e.target.result;
    const preview = document.getElementById("preview");
    preview.src = imageData;
    preview.classList.remove("hidden");
  };
  reader.readAsDataURL(file);
}

// Submit
document.getElementById("product-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const productData = {
    name: document.getElementById("name").value,
    price: parseFloat(document.getElementById("price").value),
    quantity: parseFloat(document.getElementById("quantity").value),
    village: document.getElementById("village").value,
    phone: document.getElementById("phone").value,
    description: document.getElementById("description").value,
    image_url: imageData || "https://picsum.photos/400"
  };

  const result = await API.createProduct(productData);

  if (result.success) {
    alert("Product added successfully");
    window.location.href = "my_products.html";
  } else {
    alert("Failed to add product");
  }
});

// Protect page
document.addEventListener("DOMContentLoaded", () => {
  if (!API.isLoggedIn()) {
    window.location.href = "/login.html";
  }
});
</script>

</body>
</html>
