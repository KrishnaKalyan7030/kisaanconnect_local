<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Product - KisaanConnect</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="../../js/api.js"></script>

  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>

<body class="bg-[#f8f9f5] min-h-screen">

<!-- Navbar -->
<nav class="bg-white shadow-sm border-b">
  <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between">
    <h1 class="text-xl font-bold text-emerald-700">KisaanConnect</h1>

    <div class="flex gap-4">
      <a href="index.html" class="text-emerald-600">Dashboard</a>
      <a href="my_products.html" class="text-emerald-600">My Products</a>
    </div>
  </div>
</nav>

<div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-3xl shadow">

  <h2 class="text-2xl font-bold text-emerald-700 mb-6">
    Add New Product
  </h2>

  <form id="product-form">

    <!-- Image -->
    <div class="mb-6">
      <label class="block mb-2 font-medium text-gray-700">Product Image <span class="text-red-500">*</span></label>
      <input type="file" id="image" accept="image/*" onchange="previewImage(event)" required
        class="w-full p-3 border border-gray-300 rounded-xl file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100"/>
      <img id="preview" class="mt-4 rounded-xl hidden w-full h-60 object-cover border"/>
    </div>

    <!-- Name -->
    <div class="mb-4">
      <label class="block mb-2 font-medium text-gray-700">Name <span class="text-red-500">*</span></label>
      <input type="text" id="name" required
        class="w-full p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-emerald-500"/>
    </div>

    <!-- Price -->
    <div class="mb-4">
      <label class="block mb-2 font-medium text-gray-700">Price (₹/kg) <span class="text-red-500">*</span></label>
      <input type="number" id="price" step="0.01" min="0" required
        class="w-full p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-emerald-500"/>
    </div>

    <!-- Quantity -->
    <div class="mb-4">
      <label class="block mb-2 font-medium text-gray-700">Quantity (kg) <span class="text-red-500">*</span></label>
      <input type="number" id="quantity" min="0" required
        class="w-full p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-emerald-500"/>
    </div>

    <!-- Village -->
    <div class="mb-4">
      <label class="block mb-2 font-medium text-gray-700">Village <span class="text-red-500">*</span></label>
      <input type="text" id="village" required
        class="w-full p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-emerald-500"/>
    </div>

    <!-- Phone -->
    <div class="mb-4">
      <label class="block mb-2 font-medium text-gray-700">Phone <span class="text-red-500">*</span></label>
      <input type="text" id="phone" required
        class="w-full p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-emerald-500"/>
    </div>

    <!-- Available Date -->
    <div class="mb-4">
      <label class="block mb-2 font-medium text-gray-700">Available Date <span class="text-red-500">*</span></label>
      <input type="date" id="available_date" required
        class="w-full p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-emerald-500"/>
    </div>

    <!-- Available Time -->
    <div class="mb-4">
      <label class="block mb-2 font-medium text-gray-700">Available Time <span class="text-red-500">*</span></label>
      <input type="time" id="available_time" required
        class="w-full p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-emerald-500"/>
    </div>

    <!-- Description -->
    <div class="mb-6">
      <label class="block mb-2 font-medium text-gray-700">Description</label>
      <textarea id="description" rows="4"
        class="w-full p-3 border border-gray-300 rounded-xl focus:outline-none focus:border-emerald-500"></textarea>
    </div>

    <!-- Submit -->
    <button type="submit"
      class="w-full bg-emerald-600 text-white py-3 rounded-xl hover:bg-emerald-700 font-medium transition">
      Add Product
    </button>

  </form>

</div>

<script>
  // Preview Image (keep this as it is)
function previewImage(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {
    const preview = document.getElementById("preview");
    preview.src = e.target.result;
    preview.classList.remove("hidden");
  };
  reader.readAsDataURL(file);
}

// Submit Handler - Updated for multipart/form-data
document.getElementById("product-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const submitBtn = e.target.querySelector("button[type='submit']");
  const originalText = submitBtn.textContent;
  submitBtn.textContent = "Adding Product...";
  submitBtn.disabled = true;

  const formData = new FormData();

  // Required fields from Swagger
  formData.append("name", document.getElementById("name").value.trim());
  formData.append("village", document.getElementById("village").value.trim());
  formData.append("phone", document.getElementById("phone").value.trim());
  formData.append("price", document.getElementById("price").value);
  formData.append("quantity", document.getElementById("quantity").value);
  formData.append("available_date", document.getElementById("available_date").value);
  formData.append("available_time", document.getElementById("available_time").value);
  formData.append("description", document.getElementById("description").value.trim() || "");

  // Image file
  const imageFile = document.getElementById("image").files[0];
  if (!imageFile) {
    alert("Please select a product image");
    submitBtn.textContent = originalText;
    submitBtn.disabled = false;
    return;
  }
  formData.append("image", imageFile);

  // Call API
  const result = await API.createProduct(formData);

  // Reset button
  submitBtn.textContent = originalText;
  submitBtn.disabled = false;

  if (result.success) {
    alert("✅ Product added successfully!");
    window.location.href = "my_products.html";
  } else {
    alert("❌ " + (result.message || "Failed to add product. Please check console."));
    console.error("Add Product Error:", result);
  }
});
</script>
</body>
</html>
