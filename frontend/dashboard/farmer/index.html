<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Farmer Dashboard - KisaanConnect</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- API FILE -->
  <script src="../../js/api.js"></script>

  <style>
    body { font-family: 'Poppins', sans-serif; }
    .card { transition: all 0.3s ease; }
    .card:hover { transform: translateY(-4px); }
  </style>
</head>

<body class="bg-[#f8f9f5] min-h-screen pb-20">

<!-- ================= NAVBAR ================= -->
<nav class="bg-white shadow-sm border-b sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-5 py-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-emerald-700">🌱 KisaanConnect</h1>
     <a href="../../index.html" class="text-gray-700 hover:text-emerald-600 font-medium">Home</a>

    <button onclick="logoutUser()" 
      class="px-5 py-2 bg-red-100 text-red-600 rounded-xl hover:bg-red-200">
      Logout
    </button>
  </div>
</nav>

<!-- ================= CONTENT ================= -->
<div class="max-w-6xl mx-auto px-5 pt-8">

  <!-- Welcome -->
  <div class="mb-8">
    <h1 id="welcome-text" class="text-3xl font-bold text-emerald-800">
      Welcome 
    </h1>
    <p class="text-gray-600 mt-1">Manage your farm products easily</p>
  </div>

  <!-- Actions -->
  <div class="grid grid-cols-2 gap-5 mb-10">

    <a href="add_products.html" 
      class="bg-emerald-600 text-white rounded-2xl py-10 flex flex-col items-center card">
      <i class="fas fa-plus text-4xl mb-3"></i>
      <span class="text-lg font-semibold">Add Product</span>
    </a>

    <a href="my_products.html" 
      class="bg-white border-2 border-emerald-600 text-emerald-700 rounded-2xl py-10 flex flex-col items-center card">
      <i class="fas fa-list text-4xl mb-3"></i>
      <span class="text-lg font-semibold">My Products</span>
    </a>

  </div>

  <!-- Recent Products -->
  <div class="bg-white rounded-2xl shadow p-6">
    <h2 class="text-xl font-semibold mb-4">Recent Listings</h2>
    <div id="product-list" class="space-y-4"></div>
  </div>

</div>

<!-- ================= SCRIPT ================= -->
<script>


// ================= AUTH =================
function getToken() {
  return localStorage.getItem("access_token");
}

function logoutUser() {
  localStorage.clear();
  window.location.href = "../../login.html";
}


// ================= FETCH CURRENT USER =================
async function loadUser() {
  const token = getToken();

  if (!token) {
    window.location.href = "../../login.html";
    return;
  }

  try {
    const res = await fetch("http://127.0.0.1:8000/auth/me", {
      headers: {
        "Authorization": "Bearer " + token
      }
    });

    if (!res.ok) throw new Error();

    const user = await res.json();

    // Role protection
    if (user.role !== "farmer") {
      window.location.href = "../../login.html";
      return;
    }

    document.getElementById("welcome-text").innerText =
      `Welcome, ${user.name} 👋`;

  } catch (err) {
    window.location.href = "../../login.html";
  }
}


// ================= LOAD PRODUCTS =================
async function loadProducts() {
  const container = document.getElementById("product-list");

  try {
    const res = await fetch("http://127.0.0.1:8000/products");

    const data = await res.json();

    if (!res.ok) throw new Error();

    if (data.length === 0) {
      container.innerHTML = `
        <p class="text-gray-500 text-center">No products yet</p>
      `;
      return;
    }

    container.innerHTML = "";

    data.slice(0, 3).forEach(product => {
      const div = document.createElement("div");

      div.className = "p-4 bg-gray-50 rounded-xl flex justify-between";

      div.innerHTML = `
        <div>
          <p class="font-semibold">${product.name}</p>
          <p class="text-sm text-gray-600">₹${product.price} • ${product.quantity}</p>
        </div>
        <span class="text-emerald-600 font-medium">Available</span>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    container.innerHTML = `<p class="text-red-500">Failed to load products</p>`;
  }
}


// ================= INIT =================
document.addEventListener("DOMContentLoaded", async () => {
  await loadUser();
  await loadProducts();
});

</script>

</body>
</html>
