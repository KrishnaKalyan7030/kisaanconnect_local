<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>माझी उत्पादने - KisaanConnect</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    body { font-family: 'Poppins', sans-serif; }
    .product-card {
      transition: all 0.3s ease;
    }
    .product-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body class="bg-[#f8f9f5] min-h-screen pb-20">

<!-- Navbar -->
<nav class="bg-white shadow-sm border-b sticky top-0 z-50">
  <div class="max-w-6xl mx-auto px-5 py-4 flex justify-between items-center">

    <div class="flex items-center gap-3">
      <i class="fas fa-seedling text-3xl text-emerald-600"></i>
      <h1 class="text-2xl font-bold text-emerald-700">KisaanConnect</h1>
    </div>

    <div class="flex gap-4">
      <a href="add-product.html"
        class="bg-emerald-600 text-white px-5 py-2 rounded-3xl hover:bg-emerald-700">
        + Add Product
      </a>

      <a href="./index.html"
        class="text-emerald-700 font-medium">
        Dashboard
      </a>
    </div>

  </div>
</nav>

<div class="max-w-6xl mx-auto px-5 py-8">

  <!-- Title -->
  <h1 class="text-3xl font-bold text-emerald-800 mb-8">
    माझी उत्पादने
  </h1>

  <!-- Grid -->
  <div id="products-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  <!-- Empty -->
  <div id="empty" class="hidden text-center mt-20">
    <i class="fas fa-box text-6xl text-gray-300"></i>
    <p class="text-gray-500 mt-4">No products found</p>
  </div>

</div>

<script>
const BASE_URL = "http://127.0.0.1:8000";

let allProducts = [];

// Get token
function getToken() {
  return localStorage.getItem("access_token");
}

// Load products from backend
async function loadProducts() {
  try {
    const res = await fetch(`${BASE_URL}/products/my`, {
      headers: {
        "Authorization": `Bearer ${getToken()}`
      }
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.detail || "Failed");
    }

    allProducts = data;
    renderProducts();

  } catch (err) {
    console.error(err);
    alert("Failed to load products");
  }
}

//  Render
function renderProducts() {
  const grid = document.getElementById("products-grid");
  grid.innerHTML = "";

  if (allProducts.length === 0) {
    document.getElementById("empty").classList.remove("hidden");
    return;
  }

  document.getElementById("empty").classList.add("hidden");

  allProducts.forEach(product => {

    const card = document.createElement("div");
    card.className = "product-card bg-white rounded-3xl overflow-hidden";

    card.innerHTML = `
      <img src="${product.image_url || 'https://picsum.photos/400'}"
        class="h-52 w-full object-cover"/>

      <div class="p-5">
        <h2 class="text-xl font-semibold">${product.name}</h2>
        <p class="text-emerald-600 text-2xl font-bold mt-2">
          ₹${product.price}/kg
        </p>

        <p class="text-sm text-gray-500 mt-2">
          Qty: ${product.quantity} kg
        </p>

        <div class="flex gap-3 mt-5">

          <button onclick="deleteProduct(${product.id})"
            class="flex-1 bg-red-100 text-red-600 py-2 rounded-xl">
            Delete
          </button>

        </div>
      </div>
    `;

    grid.appendChild(card);
  });
}

//  Delete
async function deleteProduct(id) {
  if (!confirm("Delete this product?")) return;

  try {
    const res = await fetch(`${BASE_URL}/products/${id}`, {
      method: "DELETE",
      headers: {
        "Authorization": `Bearer ${getToken()}`
      }
    });

    if (!res.ok) throw new Error();

    alert("Deleted successfully");
    loadProducts();

  } catch {
    alert("Delete failed");
  }
}

// ✅ Protect page
document.addEventListener("DOMContentLoaded", () => {
  const token = getToken();
  const role = localStorage.getItem("user_type");

  if (!token || role !== "farmer") {
    window.location.href = "/login.html";
    return;
  }

  loadProducts();
});
</script>

</body>
</html>
