<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - KisaanConnect Local</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
    body { font-family: 'Poppins', sans-serif; }
    .login-bg {
      background: linear-gradient(rgba(22, 101, 52, 0.85), rgba(22, 101, 52, 0.9)), 
                  url('https://picsum.photos/id/1015/1920/1080') center/cover;
    }
  </style>
</head>
<body class="bg-[#f8f9f5] min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fas fa-seedling text-3xl text-emerald-600"></i>
        <div>
          <span class="text-2xl font-bold text-emerald-700">Kisaan</span>
          <span class="text-2xl font-bold text-emerald-600">Connect</span>
        </div>
      </div>
      <a href="index.html" class="text-emerald-600 hover:text-emerald-700 font-medium flex items-center gap-2">
        <i class="fas fa-home"></i> Home
      </a>
    </div>
  </nav>

  <div class="min-h-[calc(100vh-73px)] flex items-center justify-center p-6">
    <div class="max-w-md w-full">
      <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="login-bg h-52 flex items-center justify-center text-white">
          <div class="text-center">
            <i class="fas fa-seedling text-6xl mb-4"></i>
            <h1 class="text-3xl font-bold">Welcome Back</h1>
            <p class="text-emerald-100 mt-2">Login to continue</p>
          </div>
        </div>

        <div class="p-8">
            <form id="login-form">

                      <!-- Email -->
                      <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <input type="email" id="email" 
                          class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-lg"
                          placeholder="Enter your email" required />
                      </div>
                    
                      <!-- Password -->
                      <div class="mb-8">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <input type="password" id="password" 
                          class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-lg"
                          placeholder="Enter your password" required />
                      </div>
                    
                      <!-- Login Button -->
                      <button type="submit" id="login-btn"
                        class="w-full bg-emerald-600 hover:bg-emerald-700 transition text-white font-semibold text-lg py-5 rounded-3xl flex items-center justify-center gap-3">
                        Login
                      </button>
        
             </form>

          <!-- Register Link -->
          <div class="text-center mt-8">
            <p class="text-gray-600">
              Don't have an account? 
              <a href="register.html" class="text-emerald-600 font-semibold hover:underline">Register Now</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-6 right-6 space-y-3 z-50"></div>

  <script src="js/api.js"></script>

<script>
function showToast(msg, type = "success") {
  alert(msg);
}

// ================= LOGIN =================
async function handleLogin(e) {
  e.preventDefault();

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');

  btn.disabled = true;
  btn.innerText = "Logging in...";

  try {
    // calling api here
    const result = await window.API.login(email, password);

    if (result.success) {
      const data = result.data;

      showToast("Login successful");

      // Save token
      localStorage.setItem("access_token", data.access_token);
      localStorage.setItem("user_type", data.user_type);

      // Redirect
      setTimeout(() => {
        if (data.user_type === "farmer") {
          window.location.href = "dashboard/farmer/index.html";
        } else {
          window.location.href = "marketplace.html";
        }
      }, 800);

    } else {
      showToast(result.message || result.data?.detail || "Login failed", "error");
    }

  } catch (err) {
    console.error(err);
    showToast("Something went wrong", "error");
  }

  btn.disabled = false;
  btn.innerText = "Login";
}

// attach AFTER DOM loads
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById('login-form').addEventListener('submit', handleLogin);
});
</script>
</body>
</html>
