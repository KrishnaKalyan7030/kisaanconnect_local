<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - KisaanConnect Local</title>
  <script src="https://cdn.tailwindcss.com"></script>
 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <!-- <script src="js/api.js"></script>   Our centralized API file -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
    body { font-family: 'Poppins', sans-serif; }
    .login-bg {
      background: linear-gradient(rgba(22, 101, 52, 0.85), rgba(22, 101, 52, 0.9)), 
                  url('https://picsum.photos/id/1015/1920/1080') center/cover;
    }
  </style>
</head>
<body class="bg-[#f8f9f5] min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fas fa-seedling text-3xl text-emerald-600"></i>
        <div>
          <span class="text-2xl font-bold text-emerald-700">Kisaan</span>
          <span class="text-2xl font-bold text-emerald-600">Connect</span>
        </div>
      </div>
      <a href="index.html" class="text-emerald-600 hover:text-emerald-700 font-medium flex items-center gap-2">
        <i class="fas fa-home"></i> Home
      </a>
    </div>
  </nav>

  <div class="min-h-[calc(100vh-73px)] flex items-center justify-center p-6">
    <div class="max-w-md w-full">
      <!-- Login Card -->
      <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
        <div class="login-bg h-52 flex items-center justify-center text-white">
          <div class="text-center">
            <i class="fas fa-seedling text-6xl mb-4"></i>
            <h1 class="text-3xl font-bold">Welcome Back</h1>
            <p class="text-emerald-100 mt-2">Login to continue</p>
          </div>
        </div>

        <div class="p-8">
          <form id="login-form" onsubmit="handleLogin(event)">
            
            <!-- Role Selection -->
            <div class="mb-8">
              <label class="block text-sm font-medium text-gray-700 mb-3">I am a</label>
              <div class="grid grid-cols-2 gap-4">
                <button type="button" onclick="selectRole(this)" data-role="farmer"
                  class="role-btn py-4 border-2 border-gray-200 rounded-2xl font-medium hover:border-emerald-500 transition flex flex-col items-center gap-2">
                  <i class="fas fa-seedling text-2xl"></i>
                  Farmer
                </button>
                <button type="button" onclick="selectRole(this)" data-role="buyer"
                  class="role-btn py-4 border-2 border-gray-200 rounded-2xl font-medium hover:border-emerald-500 transition flex flex-col items-center gap-2">
                  <i class="fas fa-shopping-basket text-2xl"></i>
                  Buyer
                </button>
              </div>
            </div>

            <!-- Email -->
            <div class="mb-6">
              <label class="block text-sm font-medium text-gray-700 mb-2">Email or Phone</label>
              <input type="text" id="identifier" 
                class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-lg"
                placeholder="Enter email or phone number" required />
            </div>

            <!-- Password -->
            <div class="mb-8">
              <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
              <input type="password" id="password" 
                class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-lg"
                placeholder="Enter your password" required />
            </div>

            <!-- Login Button -->
            <button type="submit" id="login-btn"
              class="w-full bg-emerald-600 hover:bg-emerald-700 transition text-white font-semibold text-lg py-5 rounded-3xl flex items-center justify-center gap-3">
              <span>Login</span>
            </button>
          </form>

          <!-- Register Link -->
          <div class="text-center mt-8">
            <p class="text-gray-600">
              Don't have an account? 
              <a href="register.html" class="text-emerald-600 font-semibold hover:underline">Register Now</a>
            </p>
          </div>
        </div>
      </div>

      <!-- Footer Note -->
      <p class="text-center text-xs text-gray-500 mt-8">
        By logging in, you agree to our Terms & Privacy Policy
      </p>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-6 right-6 space-y-3 z-50"></div>

  <script>
     let selectedRole = null;

    function selectRole(btn) {
      document.querySelectorAll('.role-btn').forEach(b => {
        b.classList.remove('border-emerald-600', 'bg-emerald-50');
      });
      btn.classList.add('border-emerald-600', 'bg-emerald-50');
      selectedRole = btn.getAttribute('data-role');
    }

    async function handleLogin(e) {
      e.preventDefault();

      const identifier = document.getElementById('identifier').value.trim();
      const password = document.getElementById('password').value.trim();
      const loginBtn = document.getElementById('login-btn');

      if (!selectedRole) {
        showToast("Please select Farmer or Buyer", "error");
        return;
      }

      if (!identifier || !password) {
        showToast("Please fill all fields", "error");
        return;
      }

      // Show loading
      const originalText = loginBtn.innerHTML;
      loginBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Logging in...`;
      loginBtn.disabled = true;

      try {
        // === LOCALSTORAGE LOGIN LOGIC ===
        let users = JSON.parse(localStorage.getItem('users')) || [];

        const user = users.find(u => 
          (u.email === identifier || u.phone === identifier) && 
          u.password === password && 
          u.role === selectedRole
        );

        if (user) {
          // Save current user session
          sessionStorage.setItem('currentUser', JSON.stringify(user));

          showToast("Login successful! Welcome back 🌱", "success");
          
          // Redirect based on role
          setTimeout(() => {
            if (selectedRole === 'farmer') {
              window.location.href = "dashboard/farmer/index.html";
            } else {
              window.location.href = "marketplace.html";
            }
          }, 1200);
        } else {
          showToast("Invalid credentials or wrong role selected", "error");
        }
      } catch (error) {
        console.error('Login error:', error);
        showToast("Something went wrong. Please try again.", "error");
      } finally {
        loginBtn.innerHTML = originalText;
        loginBtn.disabled = false;
      }
    }

    function showToast(message, type = "success") {
      const toast = document.createElement('div');
      toast.className = `px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-3 text-white 
                         ${type === 'success' ? 'bg-emerald-600' : 'bg-red-500'}`;
      toast.innerHTML = `
        <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
        <span class="font-medium">${message}</span>
      `;
      
      document.getElementById('toast-container').appendChild(toast);

      setTimeout(() => {
        toast.style.transition = 'all 0.4s ease';
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(20px)';
        setTimeout(() => toast.remove(), 400);
      }, 3000);
    }

    // Auto-select role if coming from register or direct access
    document.addEventListener('DOMContentLoaded', () => {
      // You can add pre-selection logic here if needed
    });
  </script>
   <!-- <script src="js/api.js"></script>
  <script src="js/main.js"></script> -->
</body>
</html>
