<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marketplace - KisaanConnect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="js/translations.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
    body { font-family: 'Poppins', sans-serif; }
    .product-card { transition: all 0.3s ease; }
    .product-card:active { transform: scale(0.97); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Navbar -->
<nav class="bg-white shadow-sm border-b sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <i class="fas fa-seedling text-3xl text-emerald-600"></i>
      <div class="font-bold text-2xl">
        <span class="text-emerald-700">Kisaan</span>
        <span class="text-emerald-600">Connect</span>
      </div>
    </div>

    <!-- Desktop nav -->
    <div class="hidden sm:flex items-center gap-4">
      <a href="index.html" class="text-gray-700 hover:text-emerald-600 font-medium" data-i18n="nav_home">Home</a>
      <div class="lang-switcher-slot"></div>
      <button onclick="window.Main.logout()"
        class="px-5 py-2.5 bg-red-100 text-red-600 rounded-3xl hover:bg-red-200 font-medium text-sm"
        data-i18n="nav_logout">Logout</button>
    </div>

    <!-- Mobile hamburger -->
    <button id="hamburger" class="sm:hidden p-2 text-3xl text-emerald-700">
      <i class="fas fa-bars"></i>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="hidden sm:hidden bg-white border-t px-4 py-5">
    <div class="flex flex-col gap-3 text-base font-medium">
      <a href="index.html" class="py-3 px-4 hover:bg-emerald-50 rounded-2xl" data-i18n="nav_home">Home</a>
      <div class="px-4 py-2"><div class="lang-switcher-slot"></div></div>
      <button onclick="window.Main.logout()"
        class="mt-2 w-full py-4 bg-red-100 text-red-600 rounded-3xl font-medium"
        data-i18n="nav_logout">Logout</button>
    </div>
  </div>
</nav>

<div class="max-w-7xl mx-auto px-4 py-6">
  <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-8">
    <div>
      <h1 class="text-3xl sm:text-4xl font-bold text-emerald-800" data-i18n="mkt_title">Marketplace</h1>
      <p class="text-gray-600 mt-1" data-i18n="mkt_subtitle">Fresh produce from local farmers</p>
    </div>
  </div>

  <!-- Search -->
  <div class="relative mb-8">
    <input type="text" id="search"
      placeholder="Search products... (tomato, onion, spinach...)"
      data-i18n="mkt_search_ph"
      class="w-full px-6 py-4 pl-14 border border-gray-300 rounded-3xl focus:outline-none focus:border-emerald-600 text-base"
      onkeyup="filterProducts()" />
    <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-gray-400 text-xl"></i>
  </div>

  <!-- Product Grid -->
  <div id="products" class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6"></div>

  <!-- Empty State -->
  <div id="empty" class="hidden text-center py-20">
    <i class="fas fa-box text-6xl text-gray-300"></i>
    <p class="text-gray-500 mt-6 text-xl" data-i18n="mkt_no_products">No products found</p>
    <button onclick="document.getElementById('search').value=''; filterProducts()"
      class="mt-6 px-6 py-3 bg-emerald-600 text-white rounded-3xl hover:bg-emerald-700"
      data-i18n="mkt_clear_search">Clear Search</button>
  </div>
</div>

<!-- Product Detail Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-end sm:items-center justify-center z-50 p-0 sm:p-4">
  <div class="bg-white rounded-t-3xl sm:rounded-3xl w-full sm:max-w-lg max-h-[92vh] overflow-y-auto shadow-2xl">

    <div class="relative">
      <img id="m-image" class="w-full h-56 sm:h-72 object-cover sm:rounded-t-3xl" alt="Product"
           onerror="this.src='https://picsum.photos/id/1015/400/300'"/>
      <button onclick="closeModal()"
        class="absolute top-4 right-4 bg-white rounded-full w-10 h-10 flex items-center justify-center shadow-md">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>

    <div class="p-6">
      <h3 id="m-name" class="text-2xl font-semibold"></h3>
      <p id="m-price" class="text-emerald-600 font-bold text-3xl mt-2"></p>

      <div class="grid grid-cols-2 gap-4 mt-6 text-sm">
        <div>
          <p class="text-gray-500" data-i18n="mkt_qty">Quantity</p>
          <p id="m-qty" class="font-medium mt-1"></p>
        </div>
        <div>
          <p class="text-gray-500" data-i18n="mkt_village">Village</p>
          <p id="m-village" class="font-medium mt-1"></p>
        </div>
        <div>
          <p class="text-gray-500">Available Date</p>
          <p id="m-date" class="font-medium mt-1"></p>
        </div>
        <div>
          <p class="text-gray-500">Available Time</p>
          <p id="m-time" class="font-medium mt-1"></p>
        </div>
        
      </div>

      <p id="m-phone" class="mt-6 text-sm font-medium text-gray-700"></p>

      <button onclick="contactFarmer()"
        class="mt-6 w-full bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white py-4 rounded-3xl font-semibold text-lg flex items-center justify-center gap-3 min-h-[56px]">
        <i class="fab fa-whatsapp text-xl"></i>
        <span data-i18n="mkt_contact_btn">Contact Farmer on WhatsApp</span>
      </button>

      <!-- NEW: Farmer Info Button -->
      <button onclick="viewFarmerInfo()"
        class="mt-3 w-full bg-white border-2 border-emerald-600 hover:bg-emerald-50 text-emerald-700 py-4 rounded-3xl font-semibold text-lg flex items-center justify-center gap-3 min-h-[56px]">
        <i class="fas fa-user-circle text-xl"></i>
        <span data-i18n="mkt_farmer_info">Farmer Info</span>
      </button>

      <button onclick="closeModal()"
        class="mt-3 w-full py-4 text-gray-600 font-medium min-h-[48px]"
        data-i18n="mkt_close">Close</button>
    </div>
  </div>
</div>

<!-- ==================== FARMER INFO MODAL ==================== -->
<div id="farmer-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-end sm:items-center justify-center z-50 p-0 sm:p-4">
  <div class="bg-white rounded-t-3xl sm:rounded-3xl w-full sm:max-w-lg max-h-[92vh] overflow-y-auto shadow-2xl">
    <div class="relative p-6">
      <button onclick="closeFarmerModal()" 
        class="absolute top-4 right-4 bg-white rounded-full w-10 h-10 flex items-center justify-center shadow-md z-10">
        <i class="fas fa-times text-xl"></i>
      </button>

      <!-- Farmer Photo (Circle) -->
      <div class="flex justify-center -mt-2">
        <img id="f-image" 
             class="w-32 h-32 rounded-full object-cover border-4 border-emerald-600 shadow-inner"
             alt="Farmer" 
             onerror="this.src='https://picsum.photos/id/64/300/300'">
      </div>

      <h3 id="f-name" class="text-2xl font-semibold text-center mt-6"></h3>

      <div class="grid grid-cols-2 gap-6 mt-8 text-sm">
        <div>
          <p class="text-gray-500" data-i18n="mkt_village">Village</p>
          <p id="f-village" class="font-medium mt-1"></p>
        </div>
        <div>
          <p class="text-gray-500">District</p>
          <p id="f-district" class="font-medium mt-1"></p>
        </div>
      </div>

      <!-- Google Maps Button -->
      <a id="f-map-link" href="#" target="_blank"
         class="mt-8 flex items-center justify-center gap-3 bg-emerald-100 hover:bg-emerald-200 text-emerald-700 py-4 rounded-3xl font-semibold text-base">
        <i class="fas fa-map-marker-alt"></i>
        <span data-i18n="mkt_view_map">View on Google Maps</span>
      </a>

      <!-- About the Farmer -->
      <div class="mt-10">
        <p class="text-gray-500 font-medium mb-3" data-i18n="mkt_about_farmer">About the Farmer</p>
        <p id="f-about" class="text-gray-600 leading-relaxed text-base"></p>
      </div>

      <button onclick="closeFarmerModal()" 
        class="mt-10 w-full py-4 text-gray-600 font-medium min-h-[48px]"
        data-i18n="mkt_close">Close</button>
    </div>
  </div>
</div>

<!-- ==================== LOGIN REQUIRED MODAL ==================== -->
<div id="auth-prompt-modal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-end sm:items-center justify-center z-50 p-0 sm:p-4">
  <div class="bg-white rounded-t-3xl sm:rounded-3xl w-full sm:max-w-md shadow-2xl">
    <div class="p-8 text-center">
      <i class="fas fa-lock text-6xl text-emerald-600 mb-6"></i>
      <h3 class="text-2xl font-semibold" data-i18n="mkt_login_required">Login Required</h3>
      <p class="text-gray-600 mt-3 leading-tight" data-i18n="mkt_farmer_private">
        Farmer details are private and crucial.<br>Only logged-in buyers can view them.
      </p>

      <div class="mt-10 flex flex-col gap-4">
        <button onclick="goToLogin()" 
          class="w-full bg-emerald-600 text-white py-4 rounded-3xl font-semibold text-lg">
          Login to Continue
        </button>
        <button onclick="goToRegister()" 
          class="w-full border-2 border-emerald-600 text-emerald-700 py-4 rounded-3xl font-semibold text-lg">
          Register as New Buyer
        </button>
      </div>

      <button onclick="closeAuthPrompt()" 
        class="mt-6 text-gray-500 font-medium text-sm"
        data-i18n="mkt_cancel">Cancel</button>
    </div>
  </div>
</div>

<div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 space-y-3 z-50"></div>

<script>
  let allProducts = [];
  let currentProduct = null;

  async function loadProducts() {
    try {
      const result = await window.API.getAllProducts();
      if (result.success) {
        allProducts = result.data || [];
        renderProducts(allProducts);

        // Handle direct product link
        const urlParams = new URLSearchParams(window.location.search);
        const pid = urlParams.get('product');
        if (pid) {
          const p = allProducts.find(x => String(x.id) === String(pid));
          if (p) openModal(p);
        }
        const searchQ = urlParams.get('search');
        if (searchQ) {
          document.getElementById('search').value = searchQ;
          filterProducts();
        }
      } else {
        window.API.showToast("Failed to load products", "error");
      }
    } catch (err) {
      window.API.showToast("Server error. Please try again.", "error");
    }
  }

  function renderProducts(products) {
    const container = document.getElementById("products");
    const empty = document.getElementById("empty");
    container.innerHTML = "";
    if (!products || products.length === 0) {
      empty.classList.remove("hidden");
      applyTranslations();
      return;
    }
    empty.classList.add("hidden");
    products.forEach(p => {
      const imageUrl = p.image_url || "https://picsum.photos/id/1015/400/300";
      const card = document.createElement("div");
      card.className = "product-card bg-white rounded-3xl overflow-hidden shadow-sm cursor-pointer";
      card.innerHTML = `
        <img src="${imageUrl}" class="w-full h-40 sm:h-48 object-cover"
             onerror="this.src='https://picsum.photos/id/1015/400/300'"/>
        <div class="p-4">
          <h3 class="font-semibold text-base sm:text-lg line-clamp-2">${p.name}</h3>
          <p class="text-emerald-600 font-bold text-2xl mt-2">₹${p.price}/kg</p>
          <p class="text-gray-500 text-sm mt-1">${p.quantity || 'N/A'} kg</p>
        </div>
      `;
      card.onclick = () => openModal(p);
      container.appendChild(card);
    });
  }

  function filterProducts() {
    const q = document.getElementById("search").value.toLowerCase().trim();
    renderProducts(q ? allProducts.filter(p => p.name.toLowerCase().includes(q)) : allProducts);
  }

  function openModal(product) {
    currentProduct = product;
    document.getElementById("m-image").src = product.image_url || "https://picsum.photos/id/1015/400/300";
    document.getElementById("m-name").textContent = product.name;
    document.getElementById("m-price").textContent = `₹${product.price}/kg`;
    document.getElementById("m-qty").textContent = `${product.quantity || 'N/A'} kg`;
    document.getElementById("m-village").textContent = product.village || 'N/A';
    document.getElementById("m-phone").textContent = `${window.t ? window.t('mkt_phone') : 'Phone:'} ${product.phone || 'Not available'}`;
    document.getElementById("m-date").textContent = product.available_date || 'N/A';
    document.getElementById("m-time").textContent = product.available_time || 'N/A';
    document.getElementById("modal").classList.remove("hidden");
    document.body.style.overflow = "hidden";
  }

  function closeModal() {
    document.getElementById("modal").classList.add("hidden");
    document.body.style.overflow = "";
  }

  function contactFarmer() {
    if (!currentProduct?.phone) {
      window.API.showToast("Phone number not available", "error");
      return;
    }
    const phone = currentProduct.phone.replace(/\D/g, '');
    window.open(`https://wa.me/91${phone}`, "_blank");
  }

  // ==================== NEW: Farmer Info Feature ====================

  function viewFarmerInfo() {
    if (!currentProduct) return;

    // Use your existing API method - very reliable
    if (window.API.isLoggedIn()) {
      openFarmerModal(currentProduct);
    } else {
      openAuthPrompt();
    }
  }

  function openFarmerModal(product) {
    document.getElementById("f-image").src = product.farmer_image_url || "https://picsum.photos/id/64/300/300";
    document.getElementById("f-name").textContent = product.farmer_name || "Local Farmer";
    document.getElementById("f-village").textContent = product.village || "N/A";
    document.getElementById("f-district").textContent = product.district || "N/A";

    // Auto-generated Google Maps link (works well for Indian villages)
    const query = encodeURIComponent(`${product.village || ''}, ${product.district || ''}, India`);
    document.getElementById("f-map-link").href = `https://www.google.com/maps/search/?api=1&query=${query}`;

    document.getElementById("f-about").textContent = 
      product.farmer_about || "This farmer is part of our trusted local network supplying fresh produce.";

    document.getElementById("farmer-modal").classList.remove("hidden");
    document.body.style.overflow = "hidden";
  }

  function closeFarmerModal() {
    document.getElementById("farmer-modal").classList.add("hidden");
    document.body.style.overflow = "";
  }

  function openAuthPrompt() {
    document.getElementById("auth-prompt-modal").classList.remove("hidden");
    document.body.style.overflow = "hidden";
  }

  function closeAuthPrompt() {
    document.getElementById("auth-prompt-modal").classList.add("hidden");
    document.body.style.overflow = "";
  }

  function goToLogin() {
    closeAuthPrompt();
    window.location.href = "login.html";
  }

  function goToRegister() {
    closeAuthPrompt();
    window.location.href = "register.html";
  }

  // Backdrop click handlers for all modals
  document.getElementById("modal").addEventListener("click", function(e) {
    if (e.target === this) closeModal();
  });
  document.getElementById("farmer-modal").addEventListener("click", function(e) {
    if (e.target === this) closeFarmerModal();
  });
  document.getElementById("auth-prompt-modal").addEventListener("click", function(e) {
    if (e.target === this) closeAuthPrompt();
  });

  document.getElementById('hamburger').addEventListener('click', () => {
    document.getElementById('mobile-menu').classList.toggle('hidden');
  });

  // document.addEventListener("DOMContentLoaded", () => {
  //   document.querySelectorAll('.lang-switcher-slot').forEach(s => s.innerHTML = getLangSwitcherHTML());
  //   loadProducts();
  // });

  document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll('.lang-switcher-slot').forEach(s => s.innerHTML = getLangSwitcherHTML());
  loadProducts();
  applyTranslations();   // ← Add this line
});
</script>
</body>
</html>
