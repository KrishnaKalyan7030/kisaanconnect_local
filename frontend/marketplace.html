<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marketplace - KisaanConnect</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- Core Scripts -->
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>

  <style>
    body { 
      font-family: 'Poppins', sans-serif; 
    }
    .product-card {
      transition: all 0.3s ease;
    }
    .product-card:active {
      transform: scale(0.97);
    }
  </style>
</head>

<body class="bg-gray-50 min-h-screen">

<!-- Navbar -->
<nav class="bg-white shadow-sm border-b sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <i class="fas fa-seedling text-3xl text-emerald-600"></i>
      <div class="font-bold text-2xl">
        <span class="text-emerald-700">Kisaan</span>
        <span class="text-emerald-600">Connect</span>
      </div>
    </div>

    <div class="flex items-center gap-4">
      <a href="index.html" class="text-gray-700 hover:text-emerald-600 font-medium hidden sm:block">Home</a>
      <button onclick="window.Main.logout()" 
        class="px-5 py-2.5 bg-red-100 text-red-600 rounded-3xl hover:bg-red-200 font-medium text-sm">
        Logout
      </button>
    </div>
  </div>
</nav>

<div class="max-w-7xl mx-auto px-4 py-6">

  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-8">
    <div>
      <h1 class="text-3xl sm:text-4xl font-bold text-emerald-800">Marketplace</h1>
      <p class="text-gray-600 mt-1">Fresh produce from local farmers</p>
    </div>
  </div>

  <!-- Search Bar -->
  <div class="relative mb-8">
    <input 
      type="text" 
      id="search" 
      placeholder="Search products... (tomato, onion, spinach...)"
      class="w-full px-6 py-4 pl-14 border border-gray-300 rounded-3xl focus:outline-none focus:border-emerald-600 text-base"
      onkeyup="filterProducts()"
    />
    <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-gray-400 text-xl"></i>
  </div>

  <!-- Products Grid -->
  <div id="products" class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
    <!-- Populated by JavaScript -->
  </div>

  <!-- Empty State -->
  <div id="empty" class="hidden text-center py-20">
    <i class="fas fa-box text-6xl text-gray-300"></i>
    <p class="text-gray-500 mt-6 text-xl">No products found</p>
    <button onclick="document.getElementById('search').value=''; filterProducts()" 
      class="mt-6 px-6 py-3 bg-emerald-600 text-white rounded-3xl hover:bg-emerald-700">
      Clear Search
    </button>
  </div>

</div>

<!-- Product Detail Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-3xl max-w-lg w-full max-h-[90vh] overflow-hidden shadow-2xl">
    
    <div class="relative">
      <img id="m-image" class="w-full h-64 sm:h-72 object-cover" alt="Product"/>
      <button onclick="closeModal()" 
        class="absolute top-4 right-4 bg-white rounded-full p-2 shadow-md">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>

    <div class="p-6">
      <h3 id="m-name" class="text-2xl font-semibold"></h3>
      <p id="m-price" class="text-emerald-600 font-bold text-3xl mt-2"></p>

      <div class="grid grid-cols-2 gap-4 mt-6 text-sm">
        <div>
          <p class="text-gray-500">Quantity</p>
          <p id="m-qty" class="font-medium"></p>
        </div>
        <div>
          <p class="text-gray-500">Village</p>
          <p id="m-village" class="font-medium"></p>
        </div>
      </div>

      <p id="m-phone" class="mt-6 text-sm font-medium"></p>

      <button onclick="contact()" 
        class="mt-8 w-full bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white py-4 rounded-3xl font-semibold text-lg flex items-center justify-center gap-3">
        <i class="fas fa-whatsapp"></i> Contact Farmer on WhatsApp
      </button>

      <button onclick="closeModal()" 
        class="mt-3 w-full py-4 text-gray-600 font-medium">
        Close
      </button>
    </div>
  </div>
</div>

<script>
let allProducts = [];
let currentProduct = null;

async function loadProducts() {
  try {
    const result = await window.API.getAllProducts();

    if (result.success) {
      allProducts = result.data || [];
      renderProducts(allProducts);
    } else {
      window.Main.showToast("Failed to load products", "error");
    }
  } catch (err) {
    console.error(err);
    window.Main.showToast("Server error. Please try again.", "error");
  }
}

function renderProducts(products) {
  const container = document.getElementById("products");
  const empty = document.getElementById("empty");

  container.innerHTML = "";

  if (!products || products.length === 0) {
    empty.classList.remove("hidden");
    return;
  }

  empty.classList.add("hidden");

  products.forEach(p => {
    const imageUrl = p.image_url || "https://picsum.photos/id/1015/400/300";

    const card = document.createElement("div");
    card.className = "product-card bg-white rounded-3xl overflow-hidden shadow-sm cursor-pointer";

    card.innerHTML = `
      <img src="${imageUrl}" class="w-full h-40 sm:h-48 object-cover"/>
      <div class="p-4">
        <h3 class="font-semibold text-base sm:text-lg line-clamp-2">${p.name}</h3>
        <p class="text-emerald-600 font-bold text-2xl mt-2">₹${p.price}/kg</p>
        <p class="text-gray-500 text-sm mt-1">${p.quantity || 'N/A'} kg available</p>
      </div>
    `;

    card.onclick = () => openModal(p);
    container.appendChild(card);
  });
}

function filterProducts() {
  const searchTerm = document.getElementById("search").value.toLowerCase().trim();
  
  const filtered = allProducts.filter(p => 
    p.name.toLowerCase().includes(searchTerm)
  );

  renderProducts(filtered);
}

function openModal(product) {
  currentProduct = product;
  document.getElementById("modal").classList.remove("hidden");

  document.getElementById("m-image").src = product.image_url || "https://picsum.photos/id/1015/400/300";
  document.getElementById("m-name").textContent = product.name;
  document.getElementById("m-price").textContent = `₹${product.price}/kg`;
  document.getElementById("m-qty").textContent = `${product.quantity || 'N/A'} kg`;
  document.getElementById("m-village").textContent = product.village || 'N/A';
  document.getElementById("m-phone").textContent = `Phone: ${product.phone || 'Not available'}`;
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}

function contact() {
  if (!currentProduct?.phone) {
    window.Main.showToast("Phone number not available", "error");
    return;
  }
  window.open(`https://wa.me/${currentProduct.phone}`, "_blank");
}

function logout() {
  window.Main.logout();
}

// Initialize
document.addEventListener("DOMContentLoaded", () => {
  loadProducts();
});
</script>

</body>
</html>
