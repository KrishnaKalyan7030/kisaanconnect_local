<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marketplace - KisaanConnect Local</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="js/api.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
    body { font-family: 'Poppins', sans-serif; }
    .product-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }
  </style>
</head>
<body class="bg-[#f8f9f5]">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fas fa-seedling text-3xl text-emerald-600"></i>
        <div>
          <span class="text-2xl font-bold text-emerald-700">Kisaan</span>
          <span class="text-2xl font-bold text-emerald-600">Connect</span>
        </div>
      </div>

      <div class="flex items-center gap-8 text-sm font-medium">
        <a href="index.html" class="hover:text-emerald-600">Home</a>
        <a href="marketplace.html" class="text-emerald-600 font-semibold">Marketplace</a>
        <a href="dashboard/buyer/index.html" class="hover:text-emerald-600">My Dashboard</a>
      </div>

      <div class="flex items-center gap-4">
        <button onclick="toggleLanguage()" 
          class="px-5 py-2 text-sm font-medium border border-emerald-600 text-emerald-700 rounded-3xl hover:bg-emerald-50">
          EN / हिंदी
        </button>
        <button onclick="window.API.logoutUser()" 
          class="px-6 py-3 bg-emerald-700 text-white rounded-3xl hover:bg-emerald-800 transition text-sm font-medium">
          Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-10">
    <!-- Header -->
    <div class="mb-10">
      <h1 class="text-4xl font-bold text-emerald-800">Fresh Produce Marketplace</h1>
      <p class="text-gray-600 mt-2">Direct from local farmers • Fresh • Sustainable</p>
    </div>

    <!-- Search & Filters -->
    <div class="flex flex-col md:flex-row gap-6 mb-10">
      <div class="flex-1">
        <div class="relative">
          <input type="text" id="search-input" 
            placeholder="Search tomatoes, onions, spinach, chillies..." 
            onkeyup="if(event.key === 'Enter') filterProducts()"
            class="w-full px-6 py-5 pl-14 border border-gray-300 rounded-3xl focus:outline-none focus:border-emerald-500 text-lg"/>
          <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-gray-400 text-xl"></i>
        </div>
      </div>

      <div class="flex gap-4">
        <select id="category-filter" onchange="filterProducts()" 
          class="px-6 py-5 border border-gray-300 rounded-3xl focus:outline-none focus:border-emerald-500 bg-white">
          <option value="all">All Categories</option>
          <option value="vegetables">Vegetables</option>
          <option value="greens">Leafy Greens</option>
          <option value="fruits">Fruits</option>
        </select>

        <select id="sort-filter" onchange="filterProducts()" 
          class="px-6 py-5 border border-gray-300 rounded-3xl focus:outline-none focus:border-emerald-500 bg-white">
          <option value="newest">Newest First</option>
          <option value="price-low">Price: Low to High</option>
          <option value="price-high">Price: High to Low</option>
        </select>
      </div>
    </div>

    <!-- Products Grid -->
    <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
      <!-- Populated by JavaScript -->
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-20">
      <i class="fas fa-search text-6xl text-gray-300 mb-6"></i>
      <h3 class="text-2xl font-semibold text-gray-700">No products found</h3>
      <p class="text-gray-500 mt-2">Try changing your search or filters</p>
      <button onclick="resetFilters()" 
        class="mt-6 px-8 py-3 border border-emerald-600 text-emerald-600 rounded-2xl hover:bg-emerald-50">
        Clear Filters
      </button>
    </div>
  </div>

  <!-- Product Detail Modal -->
  <div id="product-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100] p-4">
    <div class="bg-white rounded-3xl max-w-lg w-full max-h-[90vh] overflow-hidden">
      <div class="relative">
        <button onclick="closeModal()" 
          class="absolute top-4 right-4 bg-white rounded-full w-10 h-10 flex items-center justify-center shadow z-10 text-xl">
          ✕
        </button>
        <img id="modal-image" class="w-full h-80 object-cover" alt="Product Image"/>
      </div>
      
      <div class="p-8">
        <h2 id="modal-name" class="text-3xl font-bold text-emerald-800"></h2>
        <p id="modal-price" class="text-4xl font-bold text-emerald-600 mt-2"></p>
        
        <div class="grid grid-cols-2 gap-6 mt-8">
          <div>
            <p class="text-gray-500 text-sm">Available Quantity</p>
            <p id="modal-quantity" class="font-semibold text-lg"></p>
          </div>
          <div>
            <p class="text-gray-500 text-sm">Available Till</p>
            <p id="modal-till" class="font-semibold text-lg"></p>
          </div>
        </div>

        <div class="mt-8">
          <p class="text-gray-500 text-sm">Farmer Contact</p>
          <p id="modal-phone" class="font-medium text-emerald-700 text-xl"></p>
        </div>

        <div class="mt-6">
          <p class="text-gray-500 text-sm mb-2">Description</p>
          <p id="modal-description" class="text-gray-700 leading-relaxed"></p>
        </div>

        <div class="flex gap-4 mt-10">
          <button onclick="contactFarmer()" 
            class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-5 rounded-3xl transition flex items-center justify-center gap-3">
            <i class="fas fa-phone"></i> Contact Farmer on WhatsApp
          </button>
          <button onclick="closeModal()" 
            class="flex-1 border-2 border-gray-300 hover:bg-gray-50 font-semibold py-5 rounded-3xl transition">
            Close
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 right-6 bg-emerald-700 text-white px-8 py-4 rounded-3xl shadow-2xl flex items-center gap-3 z-[110]">
    <i class="fas fa-check-circle"></i>
    <span id="toast-message"></span>
  </div>

  <script>
    let allProducts = [];

    // Load products from Backend + LocalStorage
    async function loadProducts() {
        // 1. Load from backend (your existing API)
        const result = await window.API.getAllProducts();
        
        let backendProducts = [];
        if (result.success) {
            backendProducts = result.data || [];
        } else {
            window.API.showToast(result.message || "Failed to load backend products", "error");
        }

        // 2. Load products added by farmers from localStorage
        const localProducts = JSON.parse(localStorage.getItem('farmerProducts')) || [];

        // Merge both (you can add a flag if needed to distinguish)
        allProducts = [...backendProducts, ...localProducts.map(p => ({
            ...p,
            // Add fallbacks for missing fields so cards & modal don't break
            image_url: p.image_url || p.image || 'https://picsum.photos/id/201/600/400',
            available_till_date: p.available_till_date || p.dateAdded || 'Contact farmer',
            phone: p.phone || p.farmerPhone || 'Not available',
            category: p.category || 'vegetables'
        }))];

        filterProducts();
    }

    function renderProducts(products) {
        const grid = document.getElementById('products-grid');
        grid.innerHTML = '';

        if (products.length === 0) {
            document.getElementById('empty-state').classList.remove('hidden');
            return;
        }

        document.getElementById('empty-state').classList.add('hidden');

        products.forEach(product => {
            const card = document.createElement('div');
            card.className = `product-card bg-white rounded-3xl overflow-hidden cursor-pointer`;
            
            card.innerHTML = `
                <img src="${product.image_url || 'https://picsum.photos/id/201/600/400'}" 
                     class="w-full h-56 object-cover" alt="${product.name}"/>
                <div class="p-6">
                    <h3 class="font-semibold text-xl">${product.name}</h3>
                    <p class="text-emerald-600 font-bold text-3xl mt-2">₹${product.price}${product.unit ? '/' + product.unit : '/kg'}</p>
                    
                    <div class="flex justify-between text-sm mt-6">
                        <div>
                            <p class="text-gray-500">Qty</p>
                            <p class="font-medium">${product.quantity} ${product.unit || 'kg'}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-gray-500">Till</p>
                            <p class="font-medium">${product.available_till_date}</p>
                        </div>
                    </div>

                    ${product.farmerName ? `<p class="text-xs text-gray-500 mt-4">By: ${product.farmerName}</p>` : ''}

                    <button onclick="event.stopImmediatePropagation(); viewProduct(${product.id});" 
                        class="mt-8 w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-medium transition">
                        View Details & Contact
                    </button>
                </div>
            `;
            card.onclick = () => viewProduct(product.id);
            grid.appendChild(card);
        });
    }

    function filterProducts() {
        const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
        const category = document.getElementById('category-filter').value;
        const sort = document.getElementById('sort-filter').value;

        let filtered = allProducts.filter(product => {
            const matchesSearch = !searchTerm || 
                product.name.toLowerCase().includes(searchTerm) ||
                (product.description && product.description.toLowerCase().includes(searchTerm));
            
            const matchesCategory = category === 'all' || 
                (product.category && product.category.toLowerCase().includes(category));
            
            return matchesSearch && matchesCategory;
        });

        // Sorting
        if (sort === 'price-low') {
            filtered.sort((a, b) => a.price - b.price);
        } else if (sort === 'price-high') {
            filtered.sort((a, b) => b.price - a.price);
        }
        // 'newest' remains as-is (backend + local order)

        renderProducts(filtered);
    }

    // Rest of your functions (viewProduct, closeModal, contactFarmer, etc.) remain almost same
    let currentProduct = null;

    function viewProduct(id) {
        currentProduct = allProducts.find(p => p.id === id);
        if (!currentProduct) return;

        document.getElementById('modal-image').src = currentProduct.image_url || 'https://picsum.photos/id/201/600/400';
        document.getElementById('modal-name').textContent = currentProduct.name;
        document.getElementById('modal-price').textContent = `₹${currentProduct.price}${currentProduct.unit ? '/' + currentProduct.unit : '/kg'}`;
        document.getElementById('modal-quantity').textContent = `${currentProduct.quantity} ${currentProduct.unit || 'kg'}`;
        document.getElementById('modal-till').textContent = currentProduct.available_till_date || 'Contact farmer';
        document.getElementById('modal-phone').textContent = currentProduct.phone || "Not available";
        document.getElementById('modal-description').textContent = currentProduct.description || "No description provided.";

        document.getElementById('product-modal').classList.remove('hidden');
        document.getElementById('product-modal').classList.add('flex');
    }

    function closeModal() {
        const modal = document.getElementById('product-modal');
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    }

    function contactFarmer() {
        if (!currentProduct || !currentProduct.phone) {
            window.API.showToast("Phone number not available", "error");
            return;
        }
        const phone = currentProduct.phone.replace(/[^0-9]/g, '');
        window.open(`https://wa.me/${phone}`, '_blank');
        window.API.showToast("Opening WhatsApp...");
    }

    function resetFilters() {
        document.getElementById('search-input').value = '';
        document.getElementById('category-filter').value = 'all';
        document.getElementById('sort-filter').value = 'newest';
        filterProducts();
    }

    function toggleLanguage() {
        window.API.showToast("Multilingual support coming soon (EN / हिंदी)");
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        loadProducts();   // Now loads both backend + localStorage products
    });

    // Close modal when clicking outside
    document.getElementById('product-modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
</script>
   <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
