<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Marketplace - KisaanConnect</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- API FILE -->
  <script src="js/api.js"></script>

  <style>
    body { font-family: 'Poppins', sans-serif; }
    .product-card {
      transition: 0.3s;
    }
    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body class="bg-gray-50">

<!-- NAVBAR -->
<nav class="bg-white shadow p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold text-emerald-700">KisaanConnect</h1>
  <button onclick="logout()" class="bg-emerald-600 text-white px-4 py-2 rounded">Logout</button>
</nav>

<div class="max-w-7xl mx-auto p-6">

  <!-- HEADER -->
  <h2 class="text-3xl font-bold text-emerald-800 mb-6">Marketplace</h2>

  <!-- SEARCH -->
  <input 
    type="text" 
    id="search" 
    placeholder="Search products..."
    class="w-full mb-6 p-3 border rounded"
    onkeyup="filterProducts()"
  />

  <!-- PRODUCTS GRID -->
  <div id="products" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
    
  </div>

  <!-- EMPTY -->
  <p id="empty" class="hidden text-center text-gray-500 mt-10">No products found</p>

</div>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center">
  <div class="bg-white p-6 rounded w-96">

    <img id="m-image" class="w-full h-48 object-cover rounded mb-4"/>

    <h3 id="m-name" class="text-xl font-bold"></h3>
    <p id="m-price" class="text-emerald-600 font-bold"></p>

    <p id="m-qty" class="mt-2"></p>
    <p id="m-date"></p>
    <p id="m-phone"></p>

    <button onclick="contact()" class="bg-emerald-600 text-white w-full mt-4 py-2 rounded">
      Contact Farmer
    </button>

    <button onclick="closeModal()" class="mt-2 w-full border py-2 rounded">
      Close
    </button>

  </div>
</div>

<script>
let allProducts = [];
let currentProduct = null;

const BASE = "http://127.0.0.1:8000"; 

// ================= LOAD PRODUCTS =================
// async function loadProducts() {
//   try {
//     const result = await window.API.getAllProducts();

//     if (result.success) {
//       allProducts = result.data;
//       renderProducts(allProducts);
//     } else {
//       alert("Failed to load products");
//     }
//   } catch (err) {
//     console.error(err);
//     alert("Server error");
//   }
// }

async function loadProducts() {
  try {
    console.log("Calling API...");

    const result = await window.API.getAllProducts();

    console.log("API RESULT:", result);

    if (result.success) {
      allProducts = result.data;
      renderProducts(allProducts);
    } else {
      console.error("API ERROR:", result);
      alert("Failed to load products");
    }

  } catch (err) {
    console.error("FETCH ERROR:", err);
    alert("Server error");
  }
}

// ================= RENDER =================
function renderProducts(products) {
  const container = document.getElementById("products");
  const empty = document.getElementById("empty");

  container.innerHTML = "";

  if (!products || products.length === 0) {
    empty.classList.remove("hidden");
    return;
  }

  empty.classList.add("hidden");

  products.forEach(p => {

    const imageUrl = p.image_url
      ? BASE + p.image_url   
      : "https://picsum.photos/300/200";

    const card = document.createElement("div");
    card.className = "product-card bg-white p-4 rounded cursor-pointer";

    card.innerHTML = `
      <img src="${imageUrl}" class="w-full h-40 object-cover rounded"/>
      <h3 class="mt-3 font-semibold">${p.name}</h3>
      <p class="text-emerald-600 font-bold">₹${p.price}/kg</p>
      <button class="bg-emerald-600 text-white w-full mt-3 py-2 rounded">
        View
      </button>
    `;
  

    card.onclick = () => openModal(p.id);

    container.appendChild(card);
  });
}

// ================= FILTER =================
function filterProducts() {
  const search = document.getElementById("search").value.toLowerCase();

  const filtered = allProducts.filter(p =>
    p.name.toLowerCase().includes(search)
  );

  renderProducts(filtered);
}

// ================= MODAL =================
function openModal(id) {
  currentProduct = allProducts.find(p => p.id === id);

  if (!currentProduct) return;

  document.getElementById("modal").classList.remove("hidden");

  const imageUrl = currentProduct.image_url
    ? BASE + currentProduct.image_url   // ✅ FIXED
    : "https://picsum.photos/300/200";

  document.getElementById("m-image").src = imageUrl;
  document.getElementById("m-name").innerText = currentProduct.name;
  document.getElementById("m-price").innerText = `₹${currentProduct.price}/kg`;
  document.getElementById("m-qty").innerText = `Quantity: ${currentProduct.quantity || "-"}`;
  document.getElementById("m-date").innerText = `Available: ${currentProduct.available_date || "-"}`;
  document.getElementById("m-phone").innerText = `Phone: ${currentProduct.phone || "-"}`;
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
}

// ================= CONTACT =================
function contact() {
  if (!currentProduct?.phone) {
    alert("Phone number not available");
    return;
  }

  window.open(`https://wa.me/${currentProduct.phone}`, "_blank");
}

// ================= LOGOUT =================
function logout() {
  localStorage.removeItem("access_token");
  window.location.href = "login.html";
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", loadProducts);
</script>

</body>
</html>
