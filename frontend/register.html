<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - KisaanConnect</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
    body { 
      font-family: 'Poppins', sans-serif; 
    }
    .register-bg {
      background: linear-gradient(rgba(22, 101, 52, 0.88), rgba(22, 101, 52, 0.92)),
                  url('https://picsum.photos/id/1015/1920/1080') center/cover;
    }
  </style>
</head>
<body class="bg-[#f8f9f5] min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fas fa-seedling text-3xl text-emerald-600"></i>
        <div class="font-bold text-2xl">
          <span class="text-emerald-700">Kisaan</span>
          <span class="text-emerald-600">Connect</span>
        </div>
      </div>
      <a href="login.html" class="text-emerald-600 hover:text-emerald-700 font-medium flex items-center gap-2 text-sm sm:text-base">
        <i class="fas fa-arrow-left"></i> Back to Login
      </a>
    </div>
  </nav>

  <div class="min-h-[calc(100vh-73px)] flex items-center justify-center p-4 sm:p-6">
    <div class="max-w-lg w-full">

      <!-- Register Card -->
      <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
        
        <!-- Header -->
        <div class="register-bg h-52 sm:h-56 flex items-center justify-center text-white">
          <div class="text-center px-6">
            <i class="fas fa-handshake text-5xl sm:text-6xl mb-4"></i>
            <h1 class="text-2xl sm:text-3xl font-bold">Join KisaanConnect</h1>
            <p class="text-emerald-100 mt-2 text-sm sm:text-base">Start your journey with us</p>
          </div>
        </div>

        <div class="p-6 sm:p-8">
          <form id="register-form" onsubmit="handleRegister(event)">

            <!-- Full Name -->
            <div class="mb-5">
              <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
              <input type="text" id="name" 
                class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-base"
                placeholder="Enter your full name" required />
            </div>

            <!-- Email -->
            <div class="mb-5">
              <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
              <input type="email" id="email" 
                class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-base"
                placeholder="your@email.com" required />
            </div>

            <!-- Phone -->
            <div class="mb-5">
              <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number</label>
              <input type="tel" id="phone" 
                class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-base"
                placeholder="+91 98765 43210" required />
            </div>

            <!-- Village & District -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-5">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Village</label>
                <input type="text" id="village" 
                  class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-base"
                  placeholder="Village" required />
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">District</label>
                <input type="text" id="district" 
                  class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-base"
                  placeholder="District" required />
              </div>
            </div>

            <!-- Password -->
            <div class="mb-5">
              <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
              <input type="password" id="password" 
                class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-base"
                placeholder="Create a strong password" required />
            </div>

            <!-- Confirm Password -->
            <div class="mb-8">
              <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
              <input type="password" id="confirm-password" 
                class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-base"
                placeholder="Confirm your password" required />
            </div>

            <!-- Role Selection -->
            <div class="mb-8">
              <label class="block text-sm font-medium text-gray-700 mb-3">Register as</label>
              <div class="grid grid-cols-2 gap-4">
                <button type="button" onclick="selectRole(this)" data-role="farmer"
                  class="role-btn py-6 border-2 border-gray-200 rounded-3xl font-medium hover:border-emerald-500 transition flex flex-col items-center gap-3 active:scale-95">
                  <i class="fas fa-seedling text-4xl text-emerald-600"></i>
                  <span class="text-base">Farmer</span>
                </button>
                <button type="button" onclick="selectRole(this)" data-role="buyer"
                  class="role-btn py-6 border-2 border-gray-200 rounded-3xl font-medium hover:border-emerald-500 transition flex flex-col items-center gap-3 active:scale-95">
                  <i class="fas fa-shopping-basket text-4xl text-emerald-600"></i>
                  <span class="text-base">Buyer</span>
                </button>
              </div>
            </div>

            <!-- Register Button -->
            <button type="submit" id="register-btn"
              class="w-full bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 transition-all text-white font-semibold text-lg py-4 rounded-3xl flex items-center justify-center gap-3">
              Create Account
            </button>
          </form>

          <!-- Login Link -->
          <div class="text-center mt-8">
            <p class="text-gray-600 text-sm">
              Already have an account? 
              <a href="login.html" class="text-emerald-600 font-semibold hover:underline">Login here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 md:right-6 md:left-auto space-y-3 z-50"></div>

  <script>
    let selectedRole = null;

    function selectRole(btn) {
      document.querySelectorAll('.role-btn').forEach(b => {
        b.classList.remove('border-emerald-600', 'bg-emerald-50');
      });
      btn.classList.add('border-emerald-600', 'bg-emerald-50');
      selectedRole = btn.getAttribute('data-role');
    }

    function showToast(msg, type = "success") {
      const toast = document.createElement('div');
      const bg = type === 'success' ? 'bg-emerald-600' : 'bg-red-600';
      toast.className = `${bg} text-white px-6 py-4 rounded-2xl shadow-xl flex items-center gap-3 text-sm md:text-base`;
      toast.innerHTML = `
        <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>
        <span>${msg}</span>
      `;
      document.getElementById('toast-container').appendChild(toast);

      setTimeout(() => {
        toast.style.transition = 'opacity 0.3s';
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    async function handleRegister(e) {
      e.preventDefault();

      const full_name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const village = document.getElementById('village').value.trim();
      const district = document.getElementById('district').value.trim();
      const password = document.getElementById('password').value;
      const confirm_password = document.getElementById('confirm-password').value;

      if (!selectedRole) {
        showToast("Please select Farmer or Buyer", "error");
        return;
      }
      if (password !== confirm_password) {
        showToast("Passwords do not match", "error");
        return;
      }
      if (password.length < 6) {
        showToast("Password must be at least 6 characters", "error");
        return;
      }

      const userData = {
        full_name,
        email,
        phone,
        village,
        district,
        state: "Delhi",
        password,
        user_type: selectedRole
      };

      const btn = document.getElementById("register-btn");
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Creating Account...`;

      try {
        const result = await window.API.register(userData);

        if (result.success) {
          showToast("Registration successful! Redirecting to login...", "success");
          setTimeout(() => {
            window.location.href = "login.html";
          }, 1500);
        } else {
          // showToast(result.data?.detail || "Registration failed. Try again.", "error");
          const detail = result.data?.detail;
          const errMsg = Array.isArray(detail)
            ? detail.map(e => e.msg).join(", ")          // FastAPI validation errors
            : typeof detail === "string"
            ? detail
            : "Registration failed. Try again.";
          showToast(errMsg, "error");
        }
      } catch (err) {
        showToast("Something went wrong. Please check your connection.", "error");
      }

      btn.disabled = false;
      btn.innerHTML = originalText;
    }

    // Attach form submit
    document.getElementById("register-form").addEventListener("submit", handleRegister);
  </script>
</body>
</html>
