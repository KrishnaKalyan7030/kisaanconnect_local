<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - KisaanConnect Local</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="js/api.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
    body { font-family: 'Poppins', sans-serif; }
    .register-bg {
      background: linear-gradient(rgba(22, 101, 52, 0.88), rgba(22, 101, 52, 0.92)), 
                  url('https://picsum.photos/id/1015/1920/1080') center/cover;
    }
  </style>
</head>
<body class="bg-[#f8f9f5] min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fas fa-seedling text-3xl text-emerald-600"></i>
        <div>
          <span class="text-2xl font-bold text-emerald-700">Kisaan</span>
          <span class="text-2xl font-bold text-emerald-600">Connect</span>
        </div>
      </div>
      <a href="login.html" class="text-emerald-600 hover:text-emerald-700 font-medium flex items-center gap-2">
        <i class="fas fa-arrow-left"></i> Back to Login
      </a>
    </div>
  </nav>

  <div class="min-h-[calc(100vh-73px)] flex items-center justify-center p-6">
    <div class="max-w-lg w-full">
      <!-- Register Card -->
      <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
        <div class="register-bg h-56 flex items-center justify-center text-white">
          <div class="text-center">
            <i class="fas fa-handshake text-6xl mb-4"></i>
            <h1 class="text-3xl font-bold">Join KisaanConnect</h1>
            <p class="text-emerald-100 mt-2">Start your journey with us</p>
          </div>
        </div>

        <div class="p-8">
          <form id="register-form" onsubmit="handleRegister(event)">
            
            <!-- Full Name -->
            <div class="mb-6">
              <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
              <input type="text" id="name" 
                class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-lg"
                placeholder="Enter your full name" required />
            </div>

            <!-- Email -->
            <div class="mb-6">
              <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
              <input type="email" id="email" 
                class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-lg"
                placeholder="your@email.com" required />
            </div>

            <!-- Phone Number -->
            <div class="mb-6">
              <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number</label>
              <input type="tel" id="phone" 
                class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-lg"
                placeholder="+91 98765 43210" required />
            </div>

            <!-- Password -->
            <div class="mb-6">
              <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
              <input type="password" id="password" 
                class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-lg"
                placeholder="Create a strong password" required />
            </div>

            <!-- Confirm Password -->
            <div class="mb-8">
              <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
              <input type="password" id="confirm-password" 
                class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-lg"
                placeholder="Confirm your password" required />
            </div>

            <!-- village -->
               <div class="mb-6">
              <label class="block text-sm font-medium text-gray-700 mb-2">Village</label>
              <input type="text" id="village" 
                class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-lg"
                placeholder="village" required />
            </div>
               
            <!-- district -->
               <div class="mb-6">
              <label class="block text-sm font-medium text-gray-700 mb-2">District</label>
              <input type="text" id="district" 
                class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-lg"
                placeholder="District" required />
            </div>

            <!-- Role Selection -->
            <div class="mb-8">
              <label class="block text-sm font-medium text-gray-700 mb-3">Register as</label>
              <div class="grid grid-cols-2 gap-4">
                <button type="button" onclick="selectRole(this)" data-role="farmer"
                  class="role-btn py-5 border-2 border-gray-200 rounded-3xl font-medium hover:border-emerald-500 transition flex flex-col items-center gap-3">
                  <i class="fas fa-seedling text-3xl text-emerald-600"></i>
                  <span>Farmer</span>
                </button>
                <button type="button" onclick="selectRole(this)" data-role="buyer"
                  class="role-btn py-5 border-2 border-gray-200 rounded-3xl font-medium hover:border-emerald-500 transition flex flex-col items-center gap-3">
                  <i class="fas fa-shopping-basket text-3xl text-emerald-600"></i>
                  <span>Buyer</span>
                </button>
              </div>
            </div>

            <!-- Register Button -->
            <button type="submit" id="register-btn"
              class="w-full bg-emerald-600 hover:bg-emerald-700 transition-all text-white font-semibold text-lg py-5 rounded-3xl flex items-center justify-center gap-3">
              Create Account
            </button>
          </form>

          <!-- Login Link -->
          <div class="text-center mt-8">
            <p class="text-gray-600">
              Already have an account? 
              <a href="login.html" class="text-emerald-600 font-semibold hover:underline">Login here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed bottom-6 right-6 space-y-3 z-50"></div>
<script>
// Role selection
let selectedRole = null;

function selectRole(btn) {
  document.querySelectorAll('.role-btn').forEach(b => {
    b.classList.remove('border-emerald-600', 'bg-emerald-50');
  });
  btn.classList.add('border-emerald-600', 'bg-emerald-50');
  selectedRole = btn.getAttribute('data-role');
}

// Toast notification
function showToast(message, type = 'success') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  
  toast.className = `px-6 py-4 rounded-2xl shadow-xl flex items-center gap-3 text-white ${
    type === 'success' ? 'bg-emerald-600' : 'bg-red-600'
  }`;
  
  toast.innerHTML = `
    <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'} text-xl"></i>
    <span class="font-medium">${message}</span>
  `;
  
  container.appendChild(toast);

  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, 4000);
}

// Main registration handler
async function handleRegister(event) {
  event.preventDefault();

  const full_name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const password = document.getElementById('password').value;
  const confirm_password = document.getElementById('confirm-password').value;
  const village = document.getElementById('village').value.trim();
  const district = document.getElementById('district').value.trim();

  if (!selectedRole) {
    showToast('Please select your role (Farmer or Buyer)', 'error');
    return;
  }

  if (password !== confirm_password) {
    showToast('Passwords do not match!', 'error');
    return;
  }

  if (password.length < 6) {
    showToast('Password must be at least 6 characters', 'error');
    return;
  }

  const formData = {
    full_name: full_name,
    email: email,
    phone: phone,
    village: village,
    district: district,
    state: "Maharashtra",
    password: password,
    confirm_password: confirm_password,
    user_type: selectedRole
  };

  const registerBtn = document.getElementById('register-btn');
  const originalText = registerBtn.innerHTML;

  registerBtn.disabled = true;
  registerBtn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Creating Account...`;

  try {
    const response = await fetch('http://127.0.0.1:8000/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(formData)
    });

    const data = await response.json();

    if (response.ok) {
      showToast('✅ Account created successfully!', 'success');
  

      // Better redirect with delay + full path
      setTimeout(() => {
        window.location.href = '/login.html';           // Try relative path first
        // Alternative (uncomment if above doesn't work):
        // window.location.replace('login.html');
        // absolute: window.location.href = 'login.html';
      }, 1500);
    } else {
      const errorMsg = data.detail?.[0]?.msg || data.detail || 'Registration failed';
      showToast(errorMsg, 'error');
    }
  } catch (error) {
    console.error(error);
    showToast('Network error. Please try again.', 'error');
  } finally {
    registerBtn.disabled = false;
    registerBtn.innerHTML = originalText;
  }
}

// Attach the form
document.getElementById('register-form').addEventListener('submit', handleRegister);
</script>
</body>
</html>
