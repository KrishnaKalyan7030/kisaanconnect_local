<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - KisaanConnect</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="js/translations.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
    body { font-family: 'Poppins', sans-serif; }
    .register-bg {
      background: linear-gradient(rgba(22,101,52,0.88), rgba(22,101,52,0.92)),
                  url('https://picsum.photos/id/1015/1920/1080') center/cover;
    }
  </style>
</head>
<body class="bg-[#f8f9f5] min-h-screen">

<!-- Navbar -->
<nav class="bg-white shadow-sm border-b sticky top-0 z-50">
  <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <i class="fas fa-seedling text-3xl text-emerald-600"></i>
      <div class="font-bold text-2xl">
        <span class="text-emerald-700">Kisaan</span>
        <span class="text-emerald-600">Connect</span>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <div class="lang-switcher-slot"></div>
      <a href="login.html" class="text-emerald-600 hover:text-emerald-700 font-medium flex items-center gap-2 text-sm sm:text-base">
        <i class="fas fa-arrow-left"></i>
        <span data-i18n="common_back_login">Back to Login</span>
      </a>
    </div>
  </div>
</nav>

<div class="min-h-[calc(100vh-73px)] flex items-center justify-center p-4 sm:p-6">
  <div class="max-w-lg w-full">
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

      <!-- Card Header -->
      <div class="register-bg h-52 sm:h-56 flex items-center justify-center text-white">
        <div class="text-center px-6">
          <i class="fas fa-handshake text-5xl sm:text-6xl mb-4"></i>
          <h1 class="text-2xl sm:text-3xl font-bold" data-i18n="reg_title">Join KisaanConnect</h1>
          <p class="text-emerald-100 mt-2 text-sm sm:text-base" data-i18n="reg_subtitle">Start your journey with us</p>
        </div>
      </div>

      <div class="p-6 sm:p-8">
        <!-- FIX: NO onsubmit attribute here — single listener added in JS -->
        <form id="register-form">

          <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="reg_fullname">Full Name</label>
            <input type="text" id="name"
              class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-base"
              placeholder="Enter your full name" data-i18n="reg_fullname_ph" required />
          </div>

          <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="reg_email">Email Address</label>
            <input type="email" id="email"
              class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-base"
              placeholder="your@email.com" data-i18n="reg_email_ph" required />
          </div>

          <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="reg_phone">Phone Number</label>
            <input type="tel" id="phone" maxlength="10" pattern="[0-9]{10}"
              class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-base"
              placeholder="+91 98765 43210" data-i18n="reg_phone_ph" required />
          </div>

          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-5">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="reg_village">Village</label>
              <input type="text" id="village"
                class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-base"
                placeholder="Village" required />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="reg_district">District</label>
              <input type="text" id="district"
                class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-base"
                placeholder="District" required />
            </div>
          </div>

          <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="reg_state">State</label>
            <input type="text" id="state" value="Maharashtra"
              class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-base"
              placeholder="State" required />
          </div>

          <div class="mb-5">
            <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="reg_password">Password</label>
            <input type="password" id="password"
              class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-base"
              placeholder="Create a strong password" data-i18n="reg_password_ph" required />
          </div>

          <div class="mb-8">
            <label class="block text-sm font-medium text-gray-700 mb-2" data-i18n="reg_confirm_pw">Confirm Password</label>
            <!-- FIX: id is "confirm_password" (underscore) matching schema field name -->
            <input type="password" id="confirm_password"
              class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-emerald-600 text-base"
              placeholder="Confirm your password" data-i18n="reg_confirm_pw_ph" required />
          </div>

          <!-- Role Selection -->
          <div class="mb-8">
            <label class="block text-sm font-medium text-gray-700 mb-3" data-i18n="reg_role_label">Register as</label>
            <div class="grid grid-cols-2 gap-4">
              <button type="button" onclick="selectRole(this)" data-role="farmer"
                class="role-btn py-6 border-2 border-gray-200 rounded-3xl font-medium hover:border-emerald-500 transition flex flex-col items-center gap-3 active:scale-95 min-h-[100px]">
                <i class="fas fa-seedling text-4xl text-emerald-600"></i>
                <span class="text-base" data-i18n="reg_farmer">Farmer</span>
              </button>
              <button type="button" onclick="selectRole(this)" data-role="buyer"
                class="role-btn py-6 border-2 border-gray-200 rounded-3xl font-medium hover:border-emerald-500 transition flex flex-col items-center gap-3 active:scale-95 min-h-[100px]">
                <i class="fas fa-shopping-basket text-4xl text-emerald-600"></i>
                <span class="text-base" data-i18n="reg_buyer">Buyer</span>
              </button>
            </div>
          </div>

          <!-- Inline error box -->
          <div id="error-box" class="hidden mb-5 p-4 bg-red-50 border border-red-200 rounded-2xl text-red-700 text-sm flex items-start gap-2">
            <i class="fas fa-exclamation-circle mt-0.5 flex-shrink-0"></i>
            <span id="error-text"></span>
          </div>

          <button type="submit" id="register-btn"
            class="w-full bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 transition-all text-white font-semibold text-lg py-4 rounded-3xl flex items-center justify-center gap-3 min-h-[56px]"
            data-i18n="reg_btn">Create Account</button>
        </form>

        <div class="text-center mt-8">
          <p class="text-gray-600 text-sm">
            <span data-i18n="reg_have_account">Already have an account?</span>
            <a href="login.html" class="text-emerald-600 font-semibold hover:underline ml-1"
               data-i18n="reg_login_link">Login here</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 space-y-3 z-50"></div>

<script>
  let selectedRole = null;

  function selectRole(btn) {
    document.querySelectorAll('.role-btn').forEach(b => {
      b.classList.remove('border-emerald-600', 'bg-emerald-50');
    });
    btn.classList.add('border-emerald-600', 'bg-emerald-50');
    selectedRole = btn.getAttribute('data-role');
  }

  function showError(msg) {
    const box = document.getElementById('error-box');
    document.getElementById('error-text').textContent = msg;
    box.classList.remove('hidden');
    box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function hideError() {
    document.getElementById('error-box').classList.add('hidden');
  }

  // FIX: this is the ONLY submit handler — no onsubmit on the form element
  async function handleRegister(e) {
    e.preventDefault();
    hideError();

    const full_name        = document.getElementById('name').value.trim();
    const email            = document.getElementById('email').value.trim();
    const phone            = document.getElementById('phone').value.trim();
    const village          = document.getElementById('village').value.trim();
    const district         = document.getElementById('district').value.trim();
    const state            = document.getElementById('state').value.trim();
    const password         = document.getElementById('password').value;
    // FIX: correct id — "confirm_password" with underscore
    const confirm_password = document.getElementById('confirm_password').value;

    if (!selectedRole) {
      showError("Please select Farmer or Buyer");
      return;
    }
    if (password !== confirm_password) {
      showError("Passwords do not match");
      return;
    }
    if (password.length < 6) {
      showError("Password must be at least 6 characters");
      return;
    }
    if (phone.length !== 10 || !/^\d+$/.test(phone)) {
      showError("Phone number must be exactly 10 digits");
      return;
    }

    const userData = {
      full_name,
      email,
      phone,
      village,
      district,
      state,
      password,
      confirm_password,   // backend schema requires this field
      user_type: selectedRole
    };

    const btn = document.getElementById("register-btn");
    btn.disabled = true;
    btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> <span>${window.t('reg_creating')}</span>`;

    try {
      const result = await window.API.register(userData);

      if (result.success) {
        window.Main.showToast("Registration successful! Redirecting to login...", "success");
        setTimeout(() => { window.location.href = "login.html"; }, 1500);
        return;
      }

      // Parse error from FastAPI
      const detail = result?.data?.detail;
      let errMsg = "Registration failed. Please try again.";
      if (typeof detail === "string") {
        errMsg = detail;
      } else if (Array.isArray(detail)) {
        errMsg = detail.map(e => e.msg || JSON.stringify(e)).join(", ");
      } else if (detail && typeof detail === "object") {
        errMsg = JSON.stringify(detail);
      } else if (typeof result?.message === "string") {
        errMsg = result.message;
      }
      showError(errMsg);

    } catch (err) {
      showError("Something went wrong. Please check your connection.");
    }

    btn.disabled = false;
    btn.innerHTML = `<span data-i18n="reg_btn">Create Account</span>`;
    applyTranslations();
  }

  document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll('.lang-switcher-slot').forEach(s => s.innerHTML = getLangSwitcherHTML());
    // SINGLE listener — no onsubmit on form tag
    document.getElementById('register-form').addEventListener('submit', handleRegister);
  });
</script>
</body>
</html>
